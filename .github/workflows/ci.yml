name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & format ────────────────────────────────────────────────────────
  lint:
    name: Lint & format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier — check formatting
        run: npm run format:check

      - name: ESLint — API
        working-directory: apps/api
        run: npm run lint

      - name: ESLint — Web (next lint)
        working-directory: apps/web
        run: npm run lint

  # ─── API tests + coverage ─────────────────────────────────────────────────
  api-test:
    name: API — test & coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: docvault_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/docvault_test
      JWT_SECRET: ci-test-secret-not-for-production
      NODE_ENV: test
      AWS_S3_BUCKET: docvault-test
      CRON_SECRET: ci-cron-secret
      ADMIN_SECRET: ci-admin-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Run database migrations
        working-directory: apps/api
        run: npx prisma migrate deploy

      - name: Run tests with coverage
        working-directory: apps/api
        run: npm run test:coverage

  # ─── Web typecheck ────────────────────────────────────────────────────────
  web-typecheck:
    name: Web — TypeScript typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        working-directory: apps/web
        run: npx tsc --noEmit
